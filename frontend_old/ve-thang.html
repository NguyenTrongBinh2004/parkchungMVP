<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vé tháng - Parking MVP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #fff; }
    .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
    .badge-active { background-color: #198754; }
    .badge-warning { background-color: #ffc107; color: #000; }
    .badge-danger { background-color: #dc3545; }
    .thumb-img { width: 120px; height: 80px; object-fit: cover; border-radius: 5px; margin-right: 10px; background: #333; }
    .qr-img { width: 80px; height: 80px; object-fit: contain; border-radius: 5px; }
  </style>
</head>
<body class="container py-4">
  <h3 class="mb-3">🎫 Vé tháng</h3>
  <a href="dang-ky-ve-thang.html" class="btn btn-warning mb-3">+ Đăng ký vé tháng</a>
  <div id="list"></div>

  <script>
    const BASE_URL = window.location.origin;

    async function load() {
      try {
        const res = await fetch(`${BASE_URL}/danh-sach-ve-thang/`);
        const data = await res.json();
        const container = document.getElementById('list');
        if (data.length === 0) {
          container.innerHTML = '<p class="text-muted">Chưa có vé tháng nào.</p>';
          return;
        }
        container.innerHTML = data.map(ve => {
          const trangThaiClass = ve.trang_thai === 'con_han' ? 'badge-active' :
                                ve.trang_thai === 'sap_het' ? 'badge-warning' : 'badge-danger';
          const trangThaiText = ve.trang_thai === 'con_han' ? 'Còn hạn' :
                                ve.trang_thai === 'sap_het' ? 'Sắp hết' : 'Hết hạn';
          return `
            <div class="card-custom">
              <div class="d-flex align-items-start">
                ${ve.anh_bien_so ? `<img src="${ve.anh_bien_so}" class="thumb-img" alt="Biển số">` : '<div class="thumb-img d-flex align-items-center justify-content-center bg-secondary">No img</div>'}
                ${ve.anh_nguoi_dung ? `<img src="${ve.anh_nguoi_dung}" class="thumb-img" alt="Người dùng">` : ''}
                <div style="flex:1">
                  <strong>${ve.bien_so}</strong> 
                  <span class="badge ${trangThaiClass}">${trangThaiText}</span>
                  <div class="mt-1">Chủ xe: ${ve.ten_chu_xe}</div>
                  <div>SĐT: ${ve.sdt || 'N/A'}</div>
                  <div>Email: ${ve.email || 'N/A'}</div>
                  <div>Loại xe: ${ve.ten_loai_xe}</div>
                  <div>Hết hạn: ${ve.ngay_het_han} (còn ${ve.so_ngay_con} ngày)</div>
                  <div>Số tiền: ${Number(ve.so_tien).toLocaleString()} đ</div>
                  ${ve.ghi_chu ? `<div><small>${ve.ghi_chu}</small></div>` : ''}
                </div>
                ${ve.anh_qr ? `<img src="${ve.anh_qr}" class="qr-img ms-2" alt="QR">` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        document.getElementById('list').innerHTML = `<div class="alert alert-danger">Lỗi: ${err.message}</div>`;
      }
    }
    load();
  </script>
</body>
</html>
