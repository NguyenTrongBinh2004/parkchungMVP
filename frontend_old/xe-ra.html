<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xe ra - Parking MVP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #fff; }
    .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 20px; }
    .btn-accent { background-color: #FFD700; color: #000; font-weight: bold; border: none; }
    .btn-secondary { background-color: #6c757d; color: #fff; border: none; }
    .hidden { display: none; }
    .preview-img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
    .modal-content { background-color: #1e1e1e; color: #fff; }
    .form-control, .form-select { background-color: #2c2c2c; color: #fff; border: 1px solid #444; }
    .form-control:focus, .form-select:focus { background-color: #2c2c2c; color: #fff; border-color: #FFD700; box-shadow: none; }
  </style>
</head>
<body class="container py-4">
  <h3 class="mb-3">📤 Xe ra</h3>

  <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="smart-tab" data-bs-toggle="tab" data-bs-target="#smart-panel" type="button">📷 Chụp ảnh</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="qr-tab" data-bs-toggle="tab" data-bs-target="#qr-panel" type="button">🔳 Quét QR</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="bien-tab" data-bs-toggle="tab" data-bs-target="#bien-panel" type="button">🔢 Biển số</button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- Smart Panel -->
    <div class="tab-pane fade show active" id="smart-panel">
      <div class="card-custom">
        <label class="form-label">Chụp ảnh (QR hoặc biển số)</label>
        <input type="file" id="smartFile" accept="image/*" capture="environment" class="form-control" onchange="chupAnhThongMinh()">
        <div id="smartLoading" class="text-center mt-2 hidden"><div class="spinner-border text-warning"></div><p>Đang xử lý...</p></div>
        <div id="smartResult" class="mt-3 hidden"></div>
        <div id="smartImages" class="d-flex mt-2"></div>
      </div>
    </div>

    <!-- QR Panel -->
    <div class="tab-pane fade" id="qr-panel">
      <div class="card-custom">
        <label class="form-label">Chụp ảnh QR</label>
        <input type="file" id="qrFile" accept="image/*" capture="environment" class="form-control" onchange="quetQR()">
        <div id="qrLoading" class="text-center mt-2 hidden"><div class="spinner-border text-warning"></div><p>Đang xử lý...</p></div>
        <div id="qrInfo" class="mt-3 hidden">
          <p><strong>Biển số:</strong> <span id="qrBien"></span></p>
          <p><strong>Giờ vào:</strong> <span id="qrGioVao"></span></p>
          <p><strong>Tiền tạm tính:</strong> <span id="qrTien"></span> đ</p>
          <div class="mb-2">
            <label>Hình thức thanh toán</label>
            <select id="qrHinhThuc" class="form-control">
              <option value="tien_mat">Tiền mặt</option>
              <option value="chuyen_khoan">Chuyển khoản</option>
            </select>
          </div>
          <button class="btn btn-accent w-100" onclick="thanhToanQR()">Xác nhận thanh toán</button>
          <div id="qrImages" class="d-flex mt-2"></div>
        </div>
      </div>
    </div>

    <!-- Biển số Panel -->
    <div class="tab-pane fade" id="bien-panel">
      <div class="card-custom">
        <div class="mb-2">
          <label>Nhập biển số</label>
          <input type="text" id="bienSoInput" class="form-control" placeholder="VD: 51F-12345">
        </div>
        <button class="btn btn-secondary w-100 mb-3" onclick="kiemTraBienSo()">Kiểm tra</button>
        <div id="bienLoading" class="text-center mt-2 hidden"><div class="spinner-border text-warning"></div></div>
        <div id="bienInfo" class="mt-3 hidden">
          <p><strong>Biển số:</strong> <span id="bienBien"></span></p>
          <p><strong>Giờ vào:</strong> <span id="bienGioVao"></span></p>
          <p><strong>Tiền tạm tính:</strong> <span id="bienTien"></span> đ</p>
          <div class="mb-2">
            <label>Hình thức thanh toán</label>
            <select id="bienHinhThuc" class="form-control">
              <option value="tien_mat">Tiền mặt</option>
              <option value="chuyen_khoan">Chuyển khoản</option>
            </select>
          </div>
          <button class="btn btn-accent w-100" onclick="thanhToanBienSo()">Xác nhận thanh toán</button>
          <div id="bienImages" class="d-flex mt-2"></div>
        </div>
        <div id="bienNhieu" class="mt-3 hidden">
          <p class="text-warning">Có nhiều xe trùng số cuối. Vui lòng chọn:</p>
          <div id="bienList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = window.location.origin;
    let currentQRData = null;
    let currentBienData = null;

    function renderImages(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;
      let html = '';
      if (data.anh_bien_so) html += `<img src="${data.anh_bien_so}" style="width:80px; height:60px; object-fit:cover; border-radius:5px; margin-right:5px;" title="Ảnh biển số"/>`;
      if (data.anh_nguoi_lai) html += `<img src="${data.anh_nguoi_lai}" style="width:50px; height:50px; object-fit:cover; border-radius:50%;" title="Ảnh người lái"/>`;
      container.innerHTML = html;
    }

    // SMART PANEL
    async function chupAnhThongMinh() {
      const file = document.getElementById('smartFile').files[0];
      if (!file) return;
      document.getElementById('smartLoading').classList.remove('hidden');
      document.getElementById('smartResult').classList.add('hidden');
      const formData = new FormData();
      formData.append('anh', file);
      try {
        const res = await fetch(`${BASE_URL}/xe-ra/nhan-dien/`, { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('smartLoading').classList.add('hidden');
        if (data.loai === 'qr') {
          currentQRData = data;
          document.getElementById('smartResult').innerHTML = `
            <div class="card-custom">
              <p><strong>Biển số:</strong> ${data.bien_so}</p>
              <p><strong>Giờ vào:</strong> ${new Date(data.gio_vao).toLocaleString()}</p>
              <p><strong>Tiền tạm tính:</strong> ${data.so_tien_tam_tinh.toLocaleString()} đ</p>
              <p class="text-info">${data.ghi_chu || ''}</p>
              <div class="mb-2">
                <label>Hình thức thanh toán</label>
                <select id="smartHinhThuc" class="form-control">
                  <option value="tien_mat">Tiền mặt</option>
                  <option value="chuyen_khoan">Chuyển khoản</option>
                </select>
              </div>
              <button class="btn btn-accent w-100" onclick="thanhToanQR()">Xác nhận thanh toán</button>
            </div>
          `;
          renderImages('smartImages', data);
        } else if (data.loai === 'bien_so') {
          document.getElementById('smartResult').innerHTML = `
            <div class="card-custom">
              <p>Biển số nhận diện: <strong>${data.bien_so_nhan_dien || 'Không rõ'}</strong></p>
              <p class="text-muted">${data.ghi_chu || ''}</p>
              <button class="btn btn-sm btn-secondary" onclick="chuyenTabBienSo('${data.bien_so_nhan_dien}')">Điền vào ô biển số & tìm xe</button>
            </div>
          `;
        } else {
          document.getElementById('smartResult').innerHTML = '<div class="alert alert-danger">Không xử lý được ảnh.</div>';
        }
        document.getElementById('smartResult').classList.remove('hidden');
      } catch (err) {
        document.getElementById('smartLoading').classList.add('hidden');
        alert('Lỗi: ' + err.message);
      }
    }

    function chuyenTabBienSo(bienSo) {
      document.getElementById('bienSoInput').value = bienSo;
      const tabEl = document.getElementById('bien-tab');
      bootstrap.Tab.getInstance(tabEl)?.show() || new bootstrap.Tab(tabEl).show();
    }

    // QR PANEL
    async function quetQR() {
      const file = document.getElementById('qrFile').files[0];
      if (!file) return;
      document.getElementById('qrLoading').classList.remove('hidden');
      document.getElementById('qrInfo').classList.add('hidden');
      const formData = new FormData();
      formData.append('anh_qr', file);
      try {
        const res = await fetch(`${BASE_URL}/xe-ra/quet-qr/`, { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('qrLoading').classList.add('hidden');
        if (data.ma_qr) {
          currentQRData = data;
          document.getElementById('qrBien').innerText = data.bien_so;
          document.getElementById('qrGioVao').innerText = new Date(data.gio_vao).toLocaleString();
          document.getElementById('qrTien').innerText = data.so_tien_tam_tinh.toLocaleString();
          document.getElementById('qrInfo').classList.remove('hidden');
          renderImages('qrImages', data);
        } else {
          alert('Không tìm thấy xe.');
        }
      } catch (err) {
        document.getElementById('qrLoading').classList.add('hidden');
        alert('Lỗi: ' + err.message);
      }
    }

    async function thanhToanQR() {
      if (!currentQRData) return;
      const hinhThuc = document.getElementById('smartHinhThuc')?.value || document.getElementById('qrHinhThuc').value;
      const formData = new FormData();
      formData.append('hinh_thuc_thanh_toan', hinhThuc);
      try {
        const res = await fetch(`${BASE_URL}/thanh-toan/xac-nhan-qr/${currentQRData.ma_qr}`, { method: 'POST', body: formData });
        if (res.ok) {
          alert('Thanh toán thành công!');
          location.reload();
        } else {
          const err = await res.json();
          alert('Lỗi: ' + err.detail);
        }
      } catch (err) {
        alert('Lỗi: ' + err.message);
      }
    }

    // BIỂN SỐ PANEL
    async function kiemTraBienSo() {
      const bien = document.getElementById('bienSoInput').value.trim();
      if (!bien) return;
      document.getElementById('bienLoading').classList.remove('hidden');
      document.getElementById('bienInfo').classList.add('hidden');
      document.getElementById('bienNhieu').classList.add('hidden');
      const formData = new FormData();
      formData.append('bien_so', bien);
      try {
        const res = await fetch(`${BASE_URL}/xe-ra/bien-so/`, { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('bienLoading').classList.add('hidden');
        if (data.nhieu_ket_qua) {
          const list = data.danh_sach;
          const listDiv = document.getElementById('bienList');
          listDiv.innerHTML = list.map(x => `
            <div class="card-custom mb-2" style="cursor: pointer;" onclick="chonXeBien(${x.id})">
              <div class="d-flex align-items-center">
                <img src="${x.anh_bien_so || 'placeholder.png'}" style="width:80px; height:60px; object-fit:cover; border-radius:8px; margin-right:12px; background:#333;" onerror="this.src='placeholder.png'">
                <div style="flex:1">
                  <div><strong>${x.bien_so}</strong></div>
                  <div class="text-muted">Vào: ${new Date(x.gio_vao).toLocaleString()}</div>
                  <div class="text-muted">Chủ xe: ${x.ten_chu_xe || 'Không rõ'}</div>
                </div>
                <div class="text-end"><span class="badge bg-warning text-dark">${(x.so_tien_tam_tinh || 0).toLocaleString()} đ</span></div>
              </div>
            </div>
          `).join('');
          document.getElementById('bienNhieu').classList.remove('hidden');
          window.bienList = list;
        } else if (data.id) {
          currentBienData = data;
          document.getElementById('bienBien').innerText = data.bien_so;
          document.getElementById('bienGioVao').innerText = new Date(data.gio_vao).toLocaleString();
          document.getElementById('bienTien').innerText = data.so_tien_tam_tinh.toLocaleString();
          document.getElementById('bienInfo').classList.remove('hidden');
          renderImages('bienImages', data);
        } else {
          alert('Không tìm thấy xe.');
        }
      } catch (err) {
        document.getElementById('bienLoading').classList.add('hidden');
        alert('Lỗi: ' + err.message);
      }
    }

    function chonXeBien(id) {
      const xe = window.bienList.find(x => x.id === id);
      if (!xe) return;
      currentBienData = { id: xe.id, bien_so: xe.bien_so, gio_vao: xe.gio_vao, so_tien_tam_tinh: xe.so_tien_tam_tinh || 0, anh_bien_so: xe.anh_bien_so, anh_nguoi_lai: null };
      document.getElementById('bienBien').innerText = xe.bien_so;
      document.getElementById('bienGioVao').innerText = new Date(xe.gio_vao).toLocaleString();
      document.getElementById('bienTien').innerText = (xe.so_tien_tam_tinh || 0).toLocaleString();
      document.getElementById('bienInfo').classList.remove('hidden');
      document.getElementById('bienNhieu').classList.add('hidden');
      renderImages('bienImages', { anh_bien_so: xe.anh_bien_so, anh_nguoi_lai: null });
    }

    async function thanhToanBienSo() {
      const id_phien = currentBienData?.id;
      if (!id_phien) return alert('Chưa chọn xe.');
      const hinhThuc = document.getElementById('bienHinhThuc').value;
      const formData = new FormData();
      formData.append('id_phien', id_phien);
      formData.append('hinh_thuc_thanh_toan', hinhThuc);
      try {
        const res = await fetch(`${BASE_URL}/thanh-toan/xac-nhan-phi-ra/`, { method: 'POST', body: formData });
        if (res.ok) {
          alert('Thanh toán thành công!');
          location.reload();
        } else {
          const err = await res.json();
          alert('Lỗi: ' + err.detail);
        }
      } catch (err) {
        alert('Lỗi: ' + err.message);
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
